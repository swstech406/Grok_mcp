services:
  grok-search-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_IMG: "${GO_IMG:-golang:1.25.12-alpine@sha256:56961d79ea8129efddcc0b8643fd8a5416b4e6228cfd477e3fd61deb2672c587}"
        RUNTIME_IMG: "${RUNTIME_IMG:-alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc}"
        GOPROXY: "${GOPROXY:-https://proxy.golang.org,direct}"
    image: grok-search-mcp:latest
    container_name: grok-search-mcp
    restart: unless-stopped
    ports:
      # 发布到宿主机所有 IPv4 接口；公网部署应配置防火墙或置于 HTTPS 反向代理之后。
      - "0.0.0.0:8080:8080"
    environment:
      CPA_BASE_URL: "${CPA_BASE_URL:-http://host.docker.internal:8317}"
      CPA_API_KEY: "${CPA_API_KEY:-}"
      GROK_UPSTREAM_PROTOCOL: "${GROK_UPSTREAM_PROTOCOL:-responses}"
      GROK_JWT_SECRET: "${GROK_JWT_SECRET:?GROK_JWT_SECRET is required}"
      GROK_HTTP_ADDR: ":8080"
      GROK_DB_PATH: "/app/data/grok-search-mcp.db"
      GROK_BOOTSTRAP_CREDENTIALS_PATH: "${GROK_BOOTSTRAP_CREDENTIALS_PATH:-/app/data/grok-search-mcp.db.bootstrap-admin}"
      GROK_CLIENT_IP_MODE: "${GROK_CLIENT_IP_MODE:-direct}"
      GROK_TRUSTED_PROXY_CIDRS: "${GROK_TRUSTED_PROXY_CIDRS:-}"
      GROK_INITIAL_REGISTRATION_MODE: "${GROK_INITIAL_REGISTRATION_MODE:-disabled}"
      GROK_MAX_API_KEYS_PER_USER: "${GROK_MAX_API_KEYS_PER_USER:-20}"
      GROK_AUTH_PASSWORD_MAX_CONCURRENT: "${GROK_AUTH_PASSWORD_MAX_CONCURRENT:-4}"
      GROK_USAGE_RAW_RETENTION_DAYS: "${GROK_USAGE_RAW_RETENTION_DAYS:-7}"
      GROK_USAGE_HOURLY_RETENTION_DAYS: "${GROK_USAGE_HOURLY_RETENTION_DAYS:-90}"
      GROK_USAGE_DAILY_RETENTION_DAYS: "${GROK_USAGE_DAILY_RETENTION_DAYS:-730}"
      GROK_USAGE_MAINTENANCE_INTERVAL: "${GROK_USAGE_MAINTENANCE_INTERVAL:-1h}"
      GROK_SEARCH_MCP_IP_RPM: "${GROK_SEARCH_MCP_IP_RPM:-300}"
      GROK_SEARCH_MCP_IP_MAX_ENTRIES_PER_SHARD: "${GROK_SEARCH_MCP_IP_MAX_ENTRIES_PER_SHARD:-2048}"
      GROK_SEARCH_MCP_IP_FALLBACK_BUCKETS_PER_SHARD: "${GROK_SEARCH_MCP_IP_FALLBACK_BUCKETS_PER_SHARD:-16}"
      GROK_SEARCH_MCP_GLOBAL_SEARCH_CONCURRENCY: "${GROK_SEARCH_MCP_GLOBAL_SEARCH_CONCURRENCY:-16}"
      GROK_SEARCH_MCP_USER_SEARCH_CONCURRENCY: "${GROK_SEARCH_MCP_USER_SEARCH_CONCURRENCY:-4}"
      GROK_MODEL: "${GROK_MODEL:-grok-4.3}"
      GROK_HTTP_TIMEOUT: "${GROK_HTTP_TIMEOUT:-120}"
      GROK_SEARCH_MCP_DEBUG: "${GROK_SEARCH_MCP_DEBUG:-}"
    volumes:
      - grok-search-mcp-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  grok-search-mcp-data:
