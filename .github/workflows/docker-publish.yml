name: Publish release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE: maplemaplecat/grok-search-mcp
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  release-assets:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux release archives
        shell: bash
        run: |
          set -euo pipefail

          release_version="${RELEASE_TAG#v}"
          version_package="github.com/MapleMapleCat/Grok_Search_Mcp/internal/version.Version"
          mkdir -p dist

          for target_architecture in amd64 arm64; do
            archive_base_name="grok-search-mcp_linux_${target_architecture}"
            package_directory="dist/${archive_base_name}"
            mkdir -p "${package_directory}"

            CGO_ENABLED=0 GOOS=linux GOARCH="${target_architecture}" go build \
              -trimpath \
              -ldflags "-s -w -X ${version_package}=${release_version}" \
              -o "${package_directory}/grok-search-mcp" \
              ./cmd/grok-search-mcp

            cp LICENSE README.md README_CN.md .env.example advanced.env "${package_directory}/"
            tar -C dist -czf "dist/${archive_base_name}.tar.gz" "${archive_base_name}"
            rm -rf "${package_directory}"
          done

          cd dist
          for archive_path in ./*.tar.gz; do
            sha256sum "${archive_path}"
          done > checksums.txt

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"

  docker-image:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out source code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Prepare release version
        id: release
        shell: bash
        run: echo "version=${RELEASE_TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            RELEASE_VERSION=${{ steps.release.outputs.version }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
